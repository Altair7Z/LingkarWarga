<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>LingkarWarga</title>

    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <header>
      <h2>LingkarWarga</h2>
      <nav>
        <a href="#home">Home</a>
        <a href="#data">Data</a>
      </nav>
    </header>

    <main>
      <section id="home">
        <h2>Beranda</h2>

        <div>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3963.013965989131!2d106.84129871183917!3d-6.645186664936439!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69c89505b4c37d%3A0x307fc4a38e65fa2b!2sSMK%20Wikrama%20Bogor!5e0!3m2!1sid!2sid!4v1774665970441!5m2!1sid!2sid"
            class="gmap"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <div>
          <p>Laporan Infrastruktur: 24</p>
          <p>Masalah Lingkungan: 18</p>
          <p>Aktivitas Komunitas: 12</p>
        </div>

        <a href="#laporan">
          <button>Buat Laporan Baru</button>
        </a>
      </section>

      <section id="data">
        <h2>Peta Laporan</h2>

        <button class="btn-filter" onclick="filter('Infrastruktur', this)">
          Infrastruktur
        </button>
        <button class="btn-filter" onclick="filter('Lingkungan', this)">
          Lingkungan
        </button>

        <div>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13695771.34300965!2d126.53261370434846!3d33.06451742431697!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34674e0fd77f192f%3A0xf54275d47c665244!2sJepang!5e0!3m2!1sid!2sid!4v1774666072254!5m2!1sid!2sid"
            class="gmap"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <div id="dataLaporan"></div>
      </section>

      <section id="laporan">
        <h2>Buat Laporan</h2>

        <form id="pengisian">
          <input type="text" id="nama" placeholder="Nama Pelapor" />
          <br /><br />
          <input type="text" id="judul-lap" placeholder="Judul Laporan" />
          <br /><br />
          <div class="pemilihan-kategori">
            <select id="kategori">
              <option value="Infrastruktur">Infrastruktur</option>
              <option value="Lingkungan">Lingkungan</option>
            </select>
            <select id="statusInput">
              <option value="Diproses">Diproses</option>
              <option value="Selesai">Selesai</option>
            </select>
          </div>
          <br /><br />
          <button id="btn-submit" type="submit">Kirim</button>
          <button id="btn-batal" type="submit">Batal</button>
        </form>
      </section>

      <section>
        <h2>Tabel Data</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama</th>
              <th>Laporan</th>
              <th>Status</th>
              <th>Waktu</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelAdmin"></tbody>
        </table>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
